naftiko: 1.0.0-alpha2
info:
  label: APIs.io Engineering Platform Cloudflare API — Phishing URL Scanner
  description: 'APIs.io Engineering Platform Cloudflare API — Phishing URL Scanner. 1 operations. Lead operation: APIs.io
    Engineering Platform Submit suspicious URL for scanning. Self-contained Naftiko capability covering one Engineering Platform
    business surface.'
  tags:
  - Engineering Platform
  - Phishing URL Scanner
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENGINEERING_PLATFORM_API_KEY: ENGINEERING_PLATFORM_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloudflare-phishing-url-scanner
    baseUri: ''
    description: APIs.io Engineering Platform Cloudflare API — Phishing URL Scanner business capability. Self-contained, no
      shared references.
    resources:
    - name: accounts-account_id-brand-protection-submit
      path: /accounts/{account_id}/brand-protection/submit
      operations:
      - name: phishingurlscannersubmitsuspiciousurlforscanning
        method: POST
        description: APIs.io Engineering Platform Submit suspicious URL for scanning
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: account_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ENGINEERING_PLATFORM_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloudflare-phishing-url-scanner-rest
    port: 8080
    description: REST adapter for APIs.io Engineering Platform Cloudflare API — Phishing URL Scanner. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/accounts/{account-id}/brand-protection/submit
      name: accounts-account-id-brand-protection-submit
      description: REST surface for accounts-account_id-brand-protection-submit.
      operations:
      - method: POST
        name: phishingurlscannersubmitsuspiciousurlforscanning
        description: APIs.io Engineering Platform Submit suspicious URL for scanning
        call: cloudflare-phishing-url-scanner.phishingurlscannersubmitsuspiciousurlforscanning
        with:
          account_id: rest.account_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloudflare-phishing-url-scanner-mcp
    port: 9090
    transport: http
    description: MCP adapter for APIs.io Engineering Platform Cloudflare API — Phishing URL Scanner. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: apis-io-engineering-platform-submit-suspicious
      description: APIs.io Engineering Platform Submit suspicious URL for scanning
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloudflare-phishing-url-scanner.phishingurlscannersubmitsuspiciousurlforscanning
      with:
        account_id: tools.account_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
