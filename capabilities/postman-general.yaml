      operations:
      - method: GET
        name: getapis
        description: APIs.io Engineering Platform Get all APIs
        call: postman-general.getapis
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createapi
        description: APIs.io Engineering Platform Create an API
        call: postman-general.createapi
