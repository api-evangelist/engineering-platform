    description: APIs.io Engineering Platform Postman API business capability. Self-contained, no shared references.
    resources:
    - name: apis
      path: /apis
      operations:
      - name: getapis
        method: GET
        description: APIs.io Engineering Platform Get all APIs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createapi
        method: POST
        description: APIs.io Engineering Platform Create an API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: apis-apiId
      path: /apis/{apiId}
      operations:
      - name: getapi
        method: GET
        description: APIs.io Engineering Platform Get an API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateapi
        method: PUT
        description: APIs.io Engineering Platform Update an API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteapi
        method: DELETE
        description: APIs.io Engineering Platform Delete an API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: apis-apiId-tasks-taskId
      path: /apis/{apiId}/tasks/{taskId}
      operations:
      - name: getstatusofanasynctask
        method: GET
        description: APIs.io Engineering Platform Get status of an asynchronous task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: apis-apiId-versions-versionId
      path: /apis/{apiId}/versions/{versionId}
      operations:
      - name: getapiversion
        method: GET
        description: APIs.io Engineering Platform Get a version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tags-slug-entities
      path: /tags/{slug}/entities
      operations:
      - name: gettaggedentities
        method: GET
        description: APIs.io Engineering Platform Get elements by tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.ENGINEERING_PLATFORM_API_KEY}}'
      placement: header
