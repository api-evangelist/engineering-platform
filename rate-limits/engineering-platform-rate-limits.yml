specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: APIs.io Engineering Platform
providerId: apis-io-engineering-platform
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - APIs.io
  - Engineering
  - Platform
  - Rate Limiting
description: The APIs.io Engineering Platform itself is an internal manifest and does not impose its own
  request limits. Effective rate limits for any consumer call route to one of the underlying vendor APIs
  (AWS, GitHub, Cloudflare, Bing, Postman, EasyCron) and are governed by that vendor's published limits.
notes: Per-vendor rate limits live in each individual provider repo. This file documents the federation
  pattern only.
sources:
  - https://github.com/api-search/engineering-platform
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-Vendor Limits
    scope: vendor
    metric: varies
    limit: see individual vendor rate-limit docs
policies:
  - name: Vendor Pass-Through
    description: All rate limiting is enforced by the underlying vendor (AWS, GitHub, Cloudflare, Bing,
      Postman, EasyCron). The engineering-platform manifest does not add its own throttling layer.
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter and honor the vendor's Retry-After
      header when present.
maintainers:
  - FN: Kin Lane
    X-twitter: apievangelist
    email: kin@apievangelist.com
