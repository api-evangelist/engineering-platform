specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: APIs.io Engineering Platform
providerId: apis-io-engineering-platform
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - APIs.io
  - Engineering
  - Platform
  - Internal
description: The APIs.io Engineering Platform is an internal index/manifest of the third-party suppliers
  (AWS, GitHub, Cloudflare, Microsoft Bing, Postman, EasyCron, etc.) that APIs.io depends on. It does
  not itself publish a price sheet; pricing for each underlying service is set by that service's vendor.
  See each individual provider repo for its own plans/pricing artifact.
notes: This repo is a federation manifest, not a billable API surface. For real prices, consult the linked
  vendor pricing pages (AWS, GitHub, Cloudflare, Microsoft Bing, Postman, EasyCron).
sources:
  - https://github.com/api-search/engineering-platform
plans:
  - id: engineering-platform-internal-manifest
    name: Internal Platform Manifest
    type: enterprise
    description: APIs.io's internal manifest of platform dependencies. There is no separate price for
      the manifest itself; spend rolls up from each underlying vendor invoice.
    entries:
      - label: Platform Manifest Access
        name: manifest_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see vendor pricing
        userMultiplied: false
    elements:
      - name: Amazon S3 (see aws-s3 pricing)
      - name: AWS Lambda (see aws-lambda pricing)
      - name: AWS API Gateway (see aws-api-gateway pricing)
      - name: AWS RDS (see aws-rds pricing)
      - name: AWS IAM (free with AWS account)
      - name: Microsoft Bing Search (see Microsoft pricing)
      - name: Postman (see postman.com/pricing)
      - name: Cloudflare (see cloudflare.com/plans)
      - name: GitHub (see github.com/pricing)
      - name: VSCode (free)
      - name: EasyCron (see easycron.com/pricing)
maintainers:
  - FN: Kin Lane
    X-twitter: apievangelist
    email: kin@apievangelist.com
