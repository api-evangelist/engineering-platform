specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: APIs.io Engineering Platform
providerId: apis-io-engineering-platform
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - APIs.io
  - Engineering
  - Platform
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps view for the APIs.io Engineering Platform — a federation of third-party
  vendors (AWS, GitHub, Cloudflare, Bing, Postman, EasyCron). The FinOps practice rolls up the line items
  from each vendor invoice rather than billing through a single platform meter.
notes: Spend originates with the underlying vendors; reconcile against each vendor's billing/usage API
  (AWS Cost Explorer / CUR, GitHub billing, Cloudflare billing, Microsoft Azure Cost Management for Bing,
  Postman billing, EasyCron invoices).
sources:
  - https://github.com/api-search/engineering-platform
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: APIs.io
serviceCategory: Federated Engineering Platform
billingModel:
  pricingCategory: Pass-Through Vendor Spend
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: APIs.io Engineering Platform
  ServiceCategory: Federated Engineering Platform
  ProviderName: APIs.io
  PublisherName: APIs.io
  InvoiceIssuerName: per-vendor (AWS, GitHub, Cloudflare, Microsoft, Postman, EasyCron)
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: aws_spend
    unit: USD
    aggregation: sum
    dimensions:
      - service
      - account
      - region
  - name: github_spend
    unit: USD
    aggregation: sum
    dimensions:
      - product
      - org
  - name: cloudflare_spend
    unit: USD
    aggregation: sum
    dimensions:
      - product
      - account
  - name: saas_spend
    unit: USD
    aggregation: sum
    dimensions:
      - vendor
      - product
principles:
  - name: Visibility
    description: Pull each vendor's billing data (AWS CUR, GitHub billing API, Cloudflare billing, Postman
      billing) into a single dashboard for unified APIs.io platform visibility.
  - name: Allocation
    description: Tag every vendor account / project with the consuming APIs.io workload so spend can be
      attributed back to the team or product.
  - name: Optimization
    description: Optimization is per-vendor — Reserved Instances and Savings Plans on AWS, plan-tier review
      on GitHub/Cloudflare/Postman, request batching for paid Bing search.
  - name: Accountability
    description: APIs.io engineering owns the federation; per-vendor budgets and alerts are configured
      in each vendor console with monthly review.
maintainers:
